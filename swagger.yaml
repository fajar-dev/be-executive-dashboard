openapi: 3.0.3

info:
  title: Executive Dashboard API
  description: |
    REST API for the Nusanet Executive Dashboard. Provides operational statistical data
    including revenue, ISP customers, NusaWork, HomeConnect, network alerts, and health metrics.

    ## Authentication
    The login endpoint returns two JWT tokens:
    - **Access Token** — valid for 15 minutes, send via header `Authorization: Bearer <token>`
    - **Refresh Token** — valid for 7 days, used to renew the access token

    ## Response Format
    All endpoints use a consistent response envelope:
    ```json
    {
      "success": true,
      "statusCode": 200,
      "message": "...",
      "data": { ... }
    }
    ```

    ## Period Format
    The `period`, `startPeriod`, and `endPeriod` parameters use the **YYYYMM** format
    (example: `202604` = April 2026). If not provided, the system automatically uses the current period.

  version: 1.0.0

servers:
  - url: http://localhost:4000/api
    description: Local Development
  - url: /api
    description: Production

tags:
  - name: Authentication
    description: Login and JWT token management
  - name: General
    description: Operational statistics — NOC, revenue, ISP, NusaWork, HomeConnect, alerts, and health metrics

# ──────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────
paths:
  # ────────────────────────────────────────────
  # AUTH
  # ────────────────────────────────────────────
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: |
        Authenticate user using username and password. Returns user profile,
        access token (valid for 15 minutes), and refresh token (valid for 7 days).

        Password is verified using Bun.password.verify (bcrypt-compatible).
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              valid:
                summary: Valid credentials
                value:
                  username: "admin"
                  password: "secretpassword"
              empty_username:
                summary: Empty username (validation failure example)
                value:
                  username: ""
                  password: "secretpassword"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponseData"
              example:
                success: true
                statusCode: 200
                message: "Logged in successfully"
                data:
                  user:
                    id: "usr_01HX9ZK4ABCDEF"
                    name: "Budi Santoso"
                    email: "budi@nusanet.id"
                    avatar: "https://cdn.nusanet.id/avatars/budi.jpg"
                    role: "admin"
                    lastLoginAt: "2026-04-23T08:30:00.000Z"
                    lastLoginIp: "192.168.1.10"
                    isActive: true
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ1c3JfMDFIWDlaS..."
                  refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ1c3JfMDFIWDla..."
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                statusCode: 401
                message: "Invalid credentials"
                errors: null
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # NOC
  # ────────────────────────────────────────────
  /general/noc:
    get:
      tags:
        - General
      summary: NOC ticket status
      description: |
        Returns the number of NOC tickets with the current `Open` status along with a status message
        of the overall network condition.
      operationId: getNocStatus
      security:
        - BearerAuth: []
      responses:
        "200":
          description: NOC status successfully retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NocStatus"
              examples:
                ada_gangguan:
                  summary: Network disruption detected
                  value:
                    success: true
                    statusCode: 200
                    message: "NOC status retrieved"
                    data:
                      openTickets: 5
                      statusMessage: "5 network areas experiencing degradation"
                normal:
                  summary: Normal network
                  value:
                    success: true
                    statusCode: 200
                    message: "NOC status retrieved"
                    data:
                      openTickets: 0
                      statusMessage: "All networks are normal"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # REVENUE - Summary
  # ────────────────────────────────────────────
  /general/revenue:
    get:
      tags:
        - General
      summary: Current vs previous month revenue statistics
      description: |
        Returns a comparison of total revenue for the current month versus the previous month,
        along with nominal and percentage growth.

        Data is sourced from ISX `GeneralJournal` with branch code `020`,
        estimated account prefix `400` and `401`.
      operationId: getRevenueStats
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PeriodParam"
      responses:
        "200":
          description: Revenue statistics successfully retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RevenueStats"
              examples:
                naik:
                  summary: Revenue increased compared to last month
                  value:
                    success: true
                    statusCode: 200
                    message: "Revenue retrieved"
                    data:
                      trend: "up"
                      revenueCurrent: 1850000000
                      revenuePrevious: 1750000000
                      revenueGrowth: 100000000
                      revenuePercentage: 5.71
                turun:
                  summary: Revenue decreased compared to last month
                  value:
                    success: true
                    statusCode: 200
                    message: "Revenue retrieved"
                    data:
                      trend: "down"
                      revenueCurrent: 1650000000
                      revenuePrevious: 1750000000
                      revenueGrowth: -100000000
                      revenuePercentage: -5.71
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # REVENUE - Period
  # ────────────────────────────────────────────
  /general/revenue/period:
    get:
      tags:
        - General
      summary: Revenue per account type across periods
      description: |
        Returns a revenue breakdown based on the estimated account type (`NamaPerkiraan`)
        for each month in the range `startPeriod` to `endPeriod`.

        Suitable for creating time-series revenue graphs.

        **Default**: January of the current year up to the current period.
      operationId: getRevenuePeriod
      security:
        - BearerAuth: []
      parameters:
        - name: startPeriod
          in: query
          description: Start period in YYYYMM format
          required: false
          schema:
            type: string
            pattern: '^\d{6}$'
            example: "202601"
        - name: endPeriod
          in: query
          description: End period in YYYYMM format
          required: false
          schema:
            type: string
            pattern: '^\d{6}$'
            example: "202604"
      responses:
        "200":
          description: Revenue by period successfully retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/RevenuePeriodItem"
              example:
                success: true
                statusCode: 200
                message: "Revenue period retrieved"
                data:
                  - period: "2026-01"
                    monthName: "January"
                    data:
                      - name: "Internet Service Revenue"
                        revenue: 1200000000
                      - name: "Managed Service Revenue"
                        revenue: 350000000
                  - period: "2026-02"
                    monthName: "February"
                    data:
                      - name: "Internet Service Revenue"
                        revenue: 1250000000
                      - name: "Managed Service Revenue"
                        revenue: 360000000
                  - period: "2026-03"
                    monthName: "March"
                    data:
                      - name: "Internet Service Revenue"
                        revenue: 1300000000
                      - name: "Managed Service Revenue"
                        revenue: 380000000
                  - period: "2026-04"
                    monthName: "April"
                    data:
                      - name: "Internet Service Revenue"
                        revenue: 850000000
                      - name: "Managed Service Revenue"
                        revenue: 240000000
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # REVENUE - Monthly Breakdown
  # ────────────────────────────────────────────
  /general/revenue/monthly:
    get:
      tags:
        - General
      summary: Monthly revenue breakdown by account type
      description: |
        Returns a list of revenue types along with their nominal value and percentage contribution
        to the total revenue in a given period.

        Suitable for revenue composition pie / donut charts.
      operationId: getRevenueMonthly
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PeriodParam"
      responses:
        "200":
          description: Monthly revenue breakdown successfully retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/RevenueMonthlyItem"
              example:
                success: true
                statusCode: 200
                message: "Revenue trend retrieved"
                data:
                  - name: "Internet Service Revenue"
                    revenue: 1300000000
                    percentage: 70.27
                  - name: "Managed Service Revenue"
                    revenue: 380000000
                    percentage: 20.54
                  - name: "Other Revenue"
                    revenue: 170000000
                    percentage: 9.19
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # ISP
  # ────────────────────────────────────────────
  /general/isp:
    get:
      tags:
        - General
      summary: ISP customer metrics
      description: |
        Returns customer statistics for Internet Service Provider (ServiceGroupTypeId = 1)
        for branch `020`, including:

        - **customers** — total active customers (status `AC` or `FR`)
        - **newCustomers** — new customers activated in this period
        - **newCustomersPrevious** — new customers in the previous period
        - **newCustomersGrowth** — difference in new customers
        - **churnedCustomers** — customers who stopped (status `NA`) in this period
        - **churnedCustomersPercentage** — churn ratio against total active customers (%)
      operationId: getIspStats
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PeriodParam"
      responses:
        "200":
          description: ISP statistics successfully retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/IspStats"
              examples:
                tumbuh:
                  summary: Positive growth
                  value:
                    success: true
                    statusCode: 200
                    message: "ISP stats retrieved"
                    data:
                      trend: "up"
                      customers: 12450
                      newCustomers: 180
                      newCustomersPrevious: 155
                      newCustomersGrowth: 25
                      churnedCustomers: 32
                      churnedCustomersPercentage: 0.26
                stagnan:
                  summary: Negative growth
                  value:
                    success: true
                    statusCode: 200
                    message: "ISP stats retrieved"
                    data:
                      trend: "down"
                      customers: 12398
                      newCustomers: 145
                      newCustomersPrevious: 180
                      newCustomersGrowth: -35
                      churnedCustomers: 55
                      churnedCustomersPercentage: 0.44
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # NUSAWORK
  # ────────────────────────────────────────────
  /general/nusawork:
    get:
      tags:
        - General
      summary: NusaWork service metrics
      description: |
        Returns statistics for NusaWork service users (ServiceGroup = `NW`), including:

        - **users** — total active users (subscription status `AC`)
        - **usersPrevious** — estimated users from the previous period (users - growth)
        - **usersGrowth** — new users registered in this period
        - **usersPercentage** — percentage of user growth
        - **stableCompanies** — companies already subscribed before the current period
        - **totalCompanies** — total active companies (status `AC` or `FR`)
      operationId: getNusaWorkStats
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PeriodParam"
      responses:
        "200":
          description: NusaWork statistics successfully retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NusaWorkStats"
              example:
                success: true
                statusCode: 200
                message: "NusaWork stats retrieved"
                data:
                  trend: "up"
                  users: 1240
                  usersPrevious: 1185
                  usersGrowth: 55
                  usersPercentage: 4.64
                  stableCompanies: 210
                  totalCompanies: 245
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # HOMECONNECT
  # ────────────────────────────────────────────
  /general/homeconnect:
    get:
      tags:
        - General
      summary: HomeConnect service metrics (FBP)
      description: |
        Returns statistics for HomeConnect services with ServiceGroup `FBP`, including:

        - **active** — total active customers this month (status `AC` + `FR`)
        - **activePrevious** — total active customers last month
        - **activeGrowth** — difference in total active customers this month vs last month
        - **paid** — number of customers with status `AC` (paid / fully subscribed)
        - **paidPercentage** — percentage of `AC` customers out of total active (free → paid conversion)
        - **trend** — `up` if total active increased, `down` if decreased
      operationId: getHomeConnectStats
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PeriodParam"
      responses:
        "200":
          description: HomeConnect statistics successfully retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HomeConnectStats"
              examples:
                naik:
                  summary: Positive growth dengan konversi tinggi
                  value:
                    success: true
                    statusCode: 200
                    message: "HomeConnect stats retrieved"
                    data:
                      trend: "up"
                      active: 875
                      activePrevious: 840
                      activeGrowth: 35
                      paid: 680
                      paidPercentage: 77.71
                turun:
                  summary: Customer decline
                  value:
                    success: true
                    statusCode: 200
                    message: "HomeConnect stats retrieved"
                    data:
                      trend: "down"
                      active: 820
                      activePrevious: 840
                      activeGrowth: -20
                      paid: 620
                      paidPercentage: 75.61
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # ALERTS
  # ────────────────────────────────────────────
  /general/alerts:
    get:
      tags:
        - General
      summary: Active alerts — disruptions, overdue invoices, and renewals
      description: |
        Returns three categories of operational alerts:

        ### issues
        NOC network disruptions with `Open`, `Under Investigate`, or `Scheduled` status,
        grouped by branch and status. Displays the number of incidents, affected customers,
        and the start time of the latest incident.

        ### overdue
        Internet invoices that are overdue (exp date < today) and have not been batched.
        Grouped by service type and number of days late.

        ### renewals
        Renewal invoices processed in the current month's batch,
        grouped by service group. Differentiates between renewals (existing customers) and
        new subscriptions (new customers).
      operationId: getAlerts
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Alerts successfully retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AlertsData"
              example:
                success: true
                statusCode: 200
                message: "Alerts retrieved"
                data:
                  issues:
                    - branch: "Makassar"
                      status: "Open"
                      totalIssues: 3
                      totalEffectedCustomers: 87
                      lastStartedAt: "2026-04-24T07:15:00.000Z"
                    - branch: "Makassar"
                      status: "Under Investigate"
                      totalIssues: 1
                      totalEffectedCustomers: 24
                      lastStartedAt: "2026-04-24T09:45:00.000Z"
                    - branch: "Gowa"
                      status: "Scheduled"
                      totalIssues: 2
                      totalEffectedCustomers: 45
                      lastStartedAt: "2026-04-25T00:00:00.000Z"
                  overdue:
                    - type: "Internet"
                      totalExpDays: 30
                      totalInvoices: 12
                      amount: 6800000
                    - type: "Internet"
                      totalExpDays: 15
                      totalInvoices: 28
                      amount: 14200000
                    - type: "Internet"
                      totalExpDays: 7
                      totalInvoices: 45
                      amount: 22500000
                  renewals:
                    - serviceGroup: "Internet"
                      totalServices: 320
                      amount: 160000000
                      totalInvoices: 320
                      totalRenewal: 285
                      totalNewSubscription: 35
                    - serviceGroup: "NusaWork"
                      totalServices: 85
                      amount: 42500000
                      totalInvoices: 85
                      totalRenewal: 70
                      totalNewSubscription: 15
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────────
  # HEALTH
  # ────────────────────────────────────────────
  /general/health:
    get:
      tags:
        - General
      summary: Business health indicators
      description: |
        Returns five business health indicators (KPIs) for a given period:

        | KPI | Description | Data Source |
        |-----|-------------|-------------|
        | **churnRate** | Ratio of stopped customers (status `NA`) against total active | CustomerServices |
        | **sla** | Downtime ratio against weighted uptime (weighted by customer) | NOC + CustomerServices |
        | **collectionRate** | Ratio of incoming payments against receivables (`103*` accounts) | GeneralJournal |
        | **tickets** | Ratio of completed/closed TTS tickets against total tickets (non-cancel) | TTS |
        | **arpu** | Average Revenue Per User — average net subscription per active ISP customer | CustomerServices |

        All values except `arpu` are ratios in the range of 0–1 (not converted to percentage).
      operationId: getHealthMetrics
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PeriodParam"
      responses:
        "200":
          description: Health metrics successfully retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthMetrics"
              examples:
                sehat:
                  summary: Business condition is healthy
                  value:
                    success: true
                    statusCode: 200
                    message: "Health metrics retrieved"
                    data:
                      churnRate: 0.0023
                      sla: 0.9987
                      collectionRate: 0.9654
                      tickets: 0.9210
                      arpu: 285000
                perlu_perhatian:
                  summary: Some KPIs need attention
                  value:
                    success: true
                    statusCode: 200
                    message: "Health metrics retrieved"
                    data:
                      churnRate: 0.0148
                      sla: 0.9721
                      collectionRate: 0.8230
                      tickets: 0.7650
                      arpu: 260000
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

# ──────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────
components:
  # ──────────────────────
  # PARAMETERS
  # ──────────────────────
  parameters:
    PeriodParam:
      name: period
      in: query
      description: |
        Period in **YYYYMM** format (example: `202604` = April 2026).
        If not provided, the system uses the current month's period.
      required: false
      schema:
        type: string
        pattern: '^\d{6}$'
        example: "202604"

  # ──────────────────────
  # SECURITY SCHEMES
  # ──────────────────────
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from the `/auth/login` endpoint. Valid for 15 minutes.

  # ──────────────────────
  # REUSABLE RESPONSES
  # ──────────────────────
  responses:
    ValidationError:
      description: Invalid request data (Zod validation failed)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
          example:
            success: false
            statusCode: 422
            message: "Validator failed"
            errors:
              - field: "username"
                message: "Username is required"
              - field: "password"
                message: "Password is required"

    UnauthorizedError:
      description: Token is invalid or expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            statusCode: 401
            message: "Unauthorized Access"
            errors: null

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            statusCode: 404
            message: "Validatored resource not found"
            errors: null

    InternalServerError:
      description: Server error occurred (database error, etc.)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            production:
              summary: Response in production environment
              value:
                success: false
                statusCode: 500
                message: "Internal Server Error"
                errors: null
            development:
              summary: Response in development environment (includes stack trace)
              value:
                success: false
                statusCode: 500
                message: "Internal Server Error"
                errors:
                  message: "connect ECONNREFUSED 127.0.0.1:3306"
                  stack: "Error: connect ECONNREFUSED 127.0.0.1:3306\n    at TCPConnectWrap.afterConnect [as oncomplete] (node:net:1494:16)"

  # ──────────────────────
  # SCHEMAS
  # ──────────────────────
  schemas:
    # ── GENERIC RESPONSE WRAPPERS ──────────────
    ApiResponse:
      type: object
      description: Standard envelope for all successful responses
      required:
        - success
        - statusCode
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: "Operation successful"
        data:
          description: Response payload, shape depends on the endpoint
          oneOf:
            - type: object
            - type: array

    ErrorResponse:
      type: object
      description: Standard envelope for all error responses
      required:
        - success
        - statusCode
        - message
      properties:
        success:
          type: boolean
          example: false
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: "Bad Request"
        errors:
          nullable: true
          description: Error details, can be null or object/array depending on the error type
          example: null

    ValidationErrorResponse:
      type: object
      description: Response for Zod validation error (HTTP 422)
      required:
        - success
        - statusCode
        - message
        - errors
      properties:
        success:
          type: boolean
          example: false
        statusCode:
          type: integer
          example: 422
        message:
          type: string
          example: "Validator failed"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationErrorItem"

    ValidationErrorItem:
      type: object
      description: Details of a single validation error
      properties:
        field:
          type: string
          description: Name of the field that failed validation (dot-notation for nested)
          example: "username"
        message:
          type: string
          description: Validation error message
          example: "Username is required"

    # ── AUTH ──────────────────────────────────
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          description: User's username
          example: "admin"
        password:
          type: string
          minLength: 1
          description: User password (plain text, verified with bcrypt)
          example: "secretpassword"

    LoginResponseData:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        accessToken:
          type: string
          description: "JWT access token, berlaku 15 menit. Kirim via header Authorization: Bearer {token}"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: JWT refresh token, valid for 7 days. Use to obtain a new access token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    UserProfile:
      type: object
      description: User profile (without sensitive data like password)
      properties:
        id:
          type: string
          description: Unique user ID
          example: "usr_01HX9ZK4ABCDEF"
        name:
          type: string
          description: User's full name
          example: "Budi Santoso"
        email:
          type: string
          format: email
          description: User's email address
          example: "budi@nusanet.id"
        avatar:
          type: string
          nullable: true
          description: User's profile photo URL, can be null
          example: "https://cdn.nusanet.id/avatars/budi.jpg"
        role:
          type: string
          description: User's role in the system
          example: "admin"
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: Last login time (ISO 8601), null if never logged in
          example: "2026-04-23T08:30:00.000Z"
        lastLoginIp:
          type: string
          nullable: true
          description: IP address at the last login, null if never logged in
          example: "192.168.1.10"
        isActive:
          type: boolean
          description: User account active status
          example: true

    # ── NOC ──────────────────────────────────
    NocStatus:
      type: object
      properties:
        openTickets:
          type: integer
          description: Number of NOC tickets currently with Open status
          example: 5
        statusMessage:
          type: string
          description: Brief network condition status message
          example: "5 network areas experiencing degradation"

    # ── REVENUE ──────────────────────────────
    RevenueStats:
      type: object
      properties:
        trend:
          type: string
          enum: [up, down]
          description: Trend direction of revenue compared to the previous month
          example: "up"
        revenueCurrent:
          type: number
          description: Total revenue for the current month (in Rupiah)
          example: 1850000000
        revenuePrevious:
          type: number
          description: Total revenue for the previous month (in Rupiah)
          example: 1750000000
        revenueGrowth:
          type: number
          description: Difference in revenue (current - previous), can be negative
          example: 100000000
        revenuePercentage:
          type: number
          format: float
          description: Revenue growth percentage (can be negative)
          example: 5.71

    RevenuePeriodItem:
      type: object
      description: Revenue data for one period
      properties:
        period:
          type: string
          description: Period in YYYY-MM format
          example: "2026-04"
        monthName:
          type: string
          description: Month name in Indonesian
          example: "April"
        data:
          type: array
          description: List of revenue types for this period
          items:
            $ref: "#/components/schemas/RevenueByAccount"

    RevenueByAccount:
      type: object
      properties:
        name:
          type: string
          description: Estimated account name / revenue type
          example: "Internet Service Revenue"
        revenue:
          type: number
          description: Nominal revenue (in Rupiah)
          example: 1300000000

    RevenueMonthlyItem:
      type: object
      properties:
        name:
          type: string
          description: Estimated account name / revenue type
          example: "Internet Service Revenue"
        revenue:
          type: number
          description: Nominal revenue (in Rupiah)
          example: 1300000000
        percentage:
          type: number
          format: float
          description: Percentage contribution to total revenue this month
          example: 70.27

    # ── ISP ──────────────────────────────────
    IspStats:
      type: object
      properties:
        trend:
          type: string
          enum: [up, down]
          description: Trend of new customers compared to the previous month
          example: "up"
        customers:
          type: integer
          description: Total active ISP customers (status AC or FR)
          example: 12450
        newCustomers:
          type: integer
          description: New customers activated in this period
          example: 180
        newCustomersPrevious:
          type: integer
          description: New customers activated in the previous period
          example: 155
        newCustomersGrowth:
          type: integer
          description: Difference in new customers (can be negative)
          example: 25
        churnedCustomers:
          type: integer
          description: Customers who stopped (unregistered) in this period
          example: 32
        churnedCustomersPercentage:
          type: number
          format: float
          description: Churn percentage against total active customers
          example: 0.26

    # ── NUSAWORK ──────────────────────────────
    NusaWorkStats:
      type: object
      properties:
        trend:
          type: string
          enum: [up, down]
          description: NusaWork user growth trend
          example: "up"
        users:
          type: integer
          description: Total active NusaWork users (subscription status AC)
          example: 1240
        usersPrevious:
          type: integer
          description: Estimated previous period users (users - growth)
          example: 1185
        usersGrowth:
          type: integer
          description: New users registered in this period
          example: 55
        usersPercentage:
          type: number
          format: float
          description: User growth percentage
          example: 4.64
        stableCompanies:
          type: integer
          description: Companies already subscribed before the current period
          example: 210
        totalCompanies:
          type: integer
          description: Total active companies (status AC or FR)
          example: 245

    # ── HOMECONNECT ───────────────────────────
    HomeConnectStats:
      type: object
      properties:
        trend:
          type: string
          enum: [up, down]
          description: Total active customer trend compared to last month
          example: "up"
        active:
          type: integer
          description: Total active customers this month (AC + FR)
          example: 875
        activePrevious:
          type: integer
          description: Total active customers last month
          example: 840
        activeGrowth:
          type: integer
          description: Difference in total active (can be negative)
          example: 35
        paid:
          type: integer
          description: Number of customers with AC status (paid subscription)
          example: 680
        paidPercentage:
          type: number
          format: float
          description: Percentage of paid (AC) customers out of total active — free to paid conversion rate
          example: 77.71

    # ── ALERTS ───────────────────────────────
    AlertsData:
      type: object
      properties:
        issues:
          type: array
          description: NOC network disruptions currently active
          items:
            $ref: "#/components/schemas/NocIssue"
        overdue:
          type: array
          description: Internet invoices that are overdue and unpaid
          items:
            $ref: "#/components/schemas/OverdueInvoice"
        renewals:
          type: array
          description: Renewal invoices processed in the current month's batch
          items:
            $ref: "#/components/schemas/RenewalSummary"

    NocIssue:
      type: object
      properties:
        branch:
          type: string
          description: Branch city name experiencing disruption
          example: "Makassar"
        status:
          type: string
          enum: [Open, "Under Investigate", Scheduled]
          description: Incident handling status
          example: "Open"
        totalIssues:
          type: integer
          description: Number of active NOC incidents in this branch
          example: 3
        totalEffectedCustomers:
          type: integer
          description: Number of affected customers (from noc_customer_service)
          example: 87
        lastStartedAt:
          type: string
          format: date-time
          nullable: true
          description: Start time of the latest incident (ISO 8601)
          example: "2026-04-24T07:15:00.000Z"

    OverdueInvoice:
      type: object
      properties:
        type:
          type: string
          description: "Service type from the BusinessOperation column (example: Internet)"
          example: "Internet"
        totalExpDays:
          type: integer
          description: Number of late days (DATEDIFF from exp date to today)
          example: 30
        totalInvoices:
          type: integer
          description: Number of overdue invoices with this lateness
          example: 12
        amount:
          type: number
          description: Total value of overdue invoices (in Rupiah)
          example: 6800000

    RenewalSummary:
      type: object
      properties:
        serviceGroup:
          type: string
          description: Service group name (from ServiceGroup.Description table)
          example: "Internet"
        totalServices:
          type: integer
          description: Number of unique services in this renewal batch
          example: 320
        amount:
          type: number
          description: Total renewal value (in Rupiah)
          example: 160000000
        totalInvoices:
          type: integer
          description: Number of renewal invoices
          example: 320
        totalRenewal:
          type: integer
          description: Number of renewals from existing customers (not the first invoice)
          example: 285
        totalNewSubscription:
          type: integer
          description: Number of invoices from new customers (first invoice)
          example: 35

    # ── HEALTH ───────────────────────────────
    HealthMetrics:
      type: object
      description: |
        Five business health KPIs. The values for churnRate, sla, collectionRate, and tickets
        are ratios (0–1), not percentages. Multiply by 100 to get percentages.
      properties:
        churnRate:
          type: number
          format: float
          description: |
            Ratio of stopped customers to total active.
            Formula: count(NA in this period) / count(all non-NA)
            Lower value = better (target < 2%)
          example: 0.0023
        sla:
          type: number
          format: float
          description: |
            Downtime ratio against weighted total uptime (per customer-hour).
            Formula: total_downtime_hours / (total_cs * 24 * active_days)
            Lower value = more downtime. 0 value = no downtime.
          example: 0.0013
        collectionRate:
          type: number
          format: float
          description: |
            Ratio of received payments against total receivables (accounts 103*).
            Formula: SUM(Credit) / SUM(Debit) from this month's GeneralJournal.
            Value closer to 1 = good.
          example: 0.9654
        tickets:
          type: number
          format: float
          description: |
            Ratio of resolved TTS tickets (status Call or Closed)
            against total tickets (non-Cancel) opened in this period.
            Value closer to 1 = good.
          example: 0.9210
        arpu:
          type: number
          description: |
            Average Revenue Per User — average net subscription (after discount)
            per month per active ISP customer (status AC). In Rupiah.
          example: 285000
